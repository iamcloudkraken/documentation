<!-- T1 teal -->
<circle cx="820" cy="115" r="8"  fill="url(#c1)" opacity="0.85" filter="url(#gS)"/>
<circle cx="868" cy="115" r="12" fill="url(#c1)"                filter="url(#gS)"/>
<circle cx="918" cy="115" r="9"  fill="url(#c1)" opacity="0.7"  filter="url(#gS)"/>
<!-- T2 blue -->
<circle cx="820" cy="190" r="9"  fill="url(#c2)" opacity="0.85" filter="url(#gS)"/>
<circle cx="868" cy="190" r="12" fill="url(#c2)"                filter="url(#gS)"/>
<circle cx="918" cy="190" r="8"  fill="url(#c2)" opacity="0.7"  filter="url(#gS)"/>
<!-- T3 amber -->
<circle cx="820" cy="265" r="8"  fill="url(#c3)" opacity="0.85" filter="url(#gS)"/>
<circle cx="868" cy="265" r="13" fill="url(#c3)"                filter="url(#gS)"/>
<circle cx="918" cy="265" r="9"  fill="url(#c3)" opacity="0.7"  filter="url(#gS)"/>
<!-- T4 pink -->
<circle cx="820" cy="338" r="9"  fill="url(#c4)" opacity="0.85" filter="url(#gS)"/>
<circle cx="868" cy="338" r="11" fill="url(#c4)"                filter="url(#gS)"/>
<circle cx="918" cy="338" r="8"  fill="url(#c4)" opacity="0.7"  filter="url(#gS)"/>

</svg>
