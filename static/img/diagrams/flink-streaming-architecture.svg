      font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#0f172a">Snowflake</text>
<text x="705" y="273" text-anchor="middle"
      font-family="Inter,-apple-system,sans-serif" font-size="10.5" fill="#64748b">warehouse · BI</text>

<text x="705" y="330" text-anchor="middle"
      font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#0f172a">PostgreSQL</text>
<text x="705" y="346" text-anchor="middle"
      font-family="Inter,-apple-system,sans-serif" font-size="10.5" fill="#64748b">operational DB</text>

